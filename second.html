<!DOCTYPE html>
<html>
<head>
    <title>FC Barcelona</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #0b1d3a;
            color: white;
        }

        header {
            background: linear-gradient(to right, #a50044, #004d98);
            padding: 20px;
            text-align: center;
        }

        nav {
            background-color: #111;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            color: #ffcc00;
        }

        .hero {
            text-align: center;
            padding: 50px;
        }

        .hero h1 {
            font-size: 50px;
        }

        .section {
            padding: 30px;
            text-align: center;
        }

        .card {
            background: #1c2b4a;
            padding: 20px;
            margin: 10px;
            display: inline-block;
            width: 200px;
            border-radius: 10px;
        }

        footer {
            background: #111;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>

<header>
    <h1>FC Barcelona 🔵🔴</h1>
    <p>More Than a Club</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Players</a>
    <a href="#">History</a>
    <a href="#">Contact</a>
</nav>

<div class="hero">
    <h1>Welcome to Barça</h1>
    <p>The pride of Catalonia</p>
</div>

<div class="section">
    <h2>Top Players</h2>

    <div class="card">
        <h3>Lionel Messi</h3>
        <p>Legendary Forward</p>
    </div>

    <div class="card">
        <h3>Xavi</h3>
        <p>Midfield Maestro</p>
    </div>

    <div class="card">
        <h3>Iniesta</h3>
        <p>Playmaker Genius</p>
    </div>
</div>

<footer>
    <p>© 2026 FC Barcelona Fan Page</p>
</footer>

</body>
</html>
